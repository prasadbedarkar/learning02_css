<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        /* Mobile */
        @media only screen and (min-width: 320px) and (max-width: 767px){
            body {
                background-color: lightblue;
                font-family: Arial;
            }

            h1 {
                color: red;
                font-size: 20px;
            }

            p {
                font-size: 14px;
            }

            img {
                width: 100%;
            }
        }

        /* Tablet */
        @media only screen and (min-width: 768px) and (max-width: 1023px){
            body {
                background-color: lightgreen;
            }

            h2 {
                color: blue;
                font-size: 26px;
            }

            p {
                font-size: 16px;
            }

            img {
                width: 80%;
            }
        }

        
        @media only screen and (min-width: 1024px){
            body {
                background-color: lightgray;
            }

            h3 {
                color: black;
                font-size: 32px;
            }

            p {
                font-size: 18px;
            }

            img {
                width: 50%;
            }
        }

    </style>
</head>
<body>
    <img src="images/animal4.jpg" alt="animal4">
    <h1>css media query</h1>
    <p>the background will change according to viewport width change </p>
    <h2>hello its prasad</h2>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
    <h3>welcome to fct pune</h3>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
</body>
</html>
